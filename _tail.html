  <script>
    function submitEmail(inputId, successId) {
      const input = document.getElementById(inputId);
      const email = input.value.trim();
      if (!email || !email.includes('@')) {
        input.style.borderColor = '#923434'; input.focus(); return;
      }
      input.style.borderColor = '';
      const btn = input.closest('.cta-row').querySelector('.btn-primary');
      btn.textContent = 'Sending...'; btn.disabled = true;
      fetch('https://formspree.io/f/xzdjnayo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ email })
      })
      .then(res => {
        if (res.ok) {
          input.style.display = 'none';
          btn.style.display = 'none';
          document.getElementById(successId).style.display = 'block';
        } else {
          btn.textContent = 'Try again';
          btn.disabled = false;
          input.style.borderColor = '#923434';
        }
      })
      .catch(() => {
        btn.textContent = 'Try again';
        btn.disabled = false;
        input.style.borderColor = '#923434';
      });
    }
    document.querySelectorAll('.email-input').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') el.closest('div').querySelector('.btn-primary').click(); });
    });
  </script>

</body>
</html>
